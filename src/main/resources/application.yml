spring:
  application:
    name: SpringProjectTemplate

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:springtemplatedb}
    username: ${DB_USERNAME:springprojecttemplate}
    password: ${DB_PASSWORD:Quang@123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Application Security Configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 1800000 # 30 minutes in milliseconds
      refresh-token:
        expiration: 604800000 # 7 days in milliseconds

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging Configuration
logging:
  level:
    root: INFO
    com.mkwang.springprojecttemplate: DEBUG
    org.springframework.security: DEBUG
